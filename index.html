<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>在庫管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>会議室　在庫管理</h1>
    </header>

    <main>
      <nav class="tabs" aria-label="画面切り替え">
        <button class="tab active" type="button" data-tab="stock">1ページ目: 現在の在庫</button>
        <button class="tab" type="button" data-tab="setup">2ページ目: 棚卸・品目登録</button>
        <button class="tab" type="button" data-tab="history">3ページ目: 履歴</button>
      </nav>

      <section class="page active" data-page="stock">
        <section class="card">
          <h2>在庫操作（増減・棚卸し）</h2>
          <p class="test-placeholder">
            test<br />
            <br />
            <br />
          </p>
          <form id="transactionForm">
            <div class="form-row form-row-top">
              <label>棚番号で絞り込み
                <select id="operationShelfFilter">
                  <option value="">すべて</option>
                </select>
              </label>
              <label>対象品目<select id="itemSelect" required></select></label>
            </div>
            <div class="form-row form-row-middle">
              <label>操作
                <select id="txType" required>
                  <option value="remove">出庫（-）</option>
                  <option value="add">入庫（+）</option>
                  <option value="count">棚卸し（実数セット）</option>
                </select>
              </label>
              <label>数量<input id="txAmount" type="number" min="0" required /></label>
              <label>単位
                <select id="txUnit">
                  <option value="箱">箱</option>
                  <option value="袋">袋</option>
                </select>
              </label>
            </div>
            <div class="form-row form-row-operator">
              <label>記入者名<input id="operatorInlineInput" placeholder="例: 田中" required /></label>
            </div>
            <label>記入内容（理由・補足）
              <textarea id="txNote" rows="2" placeholder="例: 研究室Aで10個使用"></textarea>
            </label>
            <button type="submit">履歴に記録して反映</button>
          </form>
        </section>

        <section class="card">
          <h2>現在の在庫一覧</h2>
          <div class="inline-controls">
            <label>棚番号で絞り込み
              <select id="listShelfFilter">
                <option value="">すべて</option>
              </select>
            </label>
          </div>
          <table>
            <thead>
              <tr>
                <th>品名</th>
                <th>メーカー</th>
                <th>棚番号</th>
                <th>カウント</th>
                <th>単位</th>
                <th>最低数</th>
                <th>メモ</th>
                <th>編集</th>
              </tr>
            </thead>
            <tbody id="itemTableBody"></tbody>
          </table>
        </section>
      </section>

      <section class="page" data-page="setup">
        <section class="card">
          <h2>品目登録</h2>
          <label>記入者名<input id="operatorSetupInput" placeholder="例: 田中" required /></label>
          <p class="test-placeholder">
            test<br />
            <br />
            <br />
            <br />
            <br />
          </p>
          <form id="itemForm">
            <div class="vertical-fields">
              <label>品名<input name="name" required /></label>
              <label>メーカー<input name="maker" /></label>
              <label>棚番号<input name="shelf" placeholder="例: A2, C4" required /></label>
              <label>初期カウント<input name="count" type="number" min="0" value="0" required /></label>
              <label>単位
                <select name="unit">
                  <option value="箱">箱</option>
                  <option value="袋">袋</option>
                </select>
              </label>
              <label>最低数<input name="minimum" type="number" min="0" value="0" required /></label>
            </div>
            <label>品目メモ<textarea name="memo" rows="3" placeholder="サイズ、保管条件、注意点など"></textarea></label>
            <button type="submit">品目を登録</button>
          </form>
        </section>
      </section>

      <section class="page compact-history" data-page="history">
        <section class="card">
          <h2>出庫履歴</h2>
          <table class="history-table history-table-8">
            <thead>
              <tr>
                <th>日時</th>
                <th>記入者</th>
                <th>記入内容</th>
              </tr>
            </thead>
            <tbody id="historyRemoveBody"></tbody>
          </table>
        </section>

        <section class="card">
          <h2>入庫履歴</h2>
          <table class="history-table history-table-8">
            <thead>
              <tr>
                <th>日時</th>
                <th>記入者</th>
                <th>記入内容</th>
              </tr>
            </thead>
            <tbody id="historyAddBody"></tbody>
          </table>
        </section>

        <section class="card">
          <h2>棚卸し（実数セット）履歴</h2>
          <table class="history-table history-table-5">
            <thead>
              <tr>
                <th>日時</th>
                <th>記入者</th>
                <th>記入内容</th>
              </tr>
            </thead>
            <tbody id="historyCountBody"></tbody>
          </table>
        </section>

        <section class="card">
          <h2>品目登録履歴</h2>
          <table class="history-table history-table-5">
            <thead>
              <tr>
                <th>日時</th>
                <th>記入者</th>
                <th>記入内容</th>
              </tr>
            </thead>
            <tbody id="historyRegisterBody"></tbody>
          </table>
        </section>
      </section>
    </main>

    <dialog id="editItemDialog">
      <form method="dialog" id="editItemForm">
        <h2>品目編集</h2>
        <div class="grid">
          <label>品名<input id="editName" required /></label>
          <label>メーカー<input id="editMaker" /></label>
          <label>棚番号<input id="editShelf" required /></label>
          <label>カウント<input id="editCount" type="number" min="0" required /></label>
          <label>単位
            <select id="editUnit">
              <option value="箱">箱</option>
              <option value="袋">袋</option>
            </select>
          </label>
          <label>最低数<input id="editMinimum" type="number" min="0" required /></label>
        </div>
        <label>品目メモ<textarea id="editMemo" rows="3"></textarea></label>
        <menu>
          <button value="destructive" type="button" id="deleteItemBtn">この品目を削除</button>
          <button value="cancel" type="button" id="cancelEditBtn">キャンセル</button>
          <button value="default" type="submit">保存</button>
        </menu>
      </form>
    </dialog>

    <dialog id="m1AlertDialog">
      <form method="dialog">
        <div class="alert-header">
          <h2>在庫警告</h2>
          <button type="button" id="closeM1AlertBtn" class="close-btn" aria-label="閉じる">×</button>
        </div>
        <p id="m1AlertMessage">M1に報告してください。</p>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
